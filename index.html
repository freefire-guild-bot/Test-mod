<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEXI TOOL | Secure Access</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Free Fire & Cyberpunk Theme Colors */
            --ff-orange: #ff6a00;
            --ff-yellow: #ffbb00;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.85);
            --text-main: #f8f9fa;
            --text-muted: #8b8d99;
            --glow-shadow: 0 0 15px rgba(255, 106, 0, 0.6);
            --danger: #ff3333;
            --success: #00ff88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at center, #1a1a24 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Abstract Background Elements */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+') repeat;
            pointer-events: none;
            z-index: 1;
        }

        .cyber-panel {
            position: relative;
            z-index: 2;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 106, 0, 0.2);
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            /* Angled corners for gaming vibe */
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .cyber-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--ff-orange), var(--ff-yellow), transparent);
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, var(--ff-yellow), var(--ff-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--glow-shadow);
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Pro Button Styling */
        .btn-cyber {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #000;
            background: linear-gradient(45deg, var(--ff-orange), var(--ff-yellow));
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            overflow: hidden;
        }

        .btn-cyber:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-shadow);
            filter: brightness(1.1);
        }

        .btn-cyber:active {
            transform: scale(0.98);
        }

        /* Status Displays */
        .status-container {
            margin-top: 25px;
            min-height: 60px; /* Prevents layout shift */
        }

        .msg-text {
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
            transition: color 0.3s ease;
        }

        .error { color: var(--danger); text-shadow: 0 0 8px rgba(255,51,51,0.5); }
        .verifying { color: var(--ff-yellow); }
        .success { color: var(--success); text-shadow: 0 0 8px rgba(0,255,136,0.5); }

        /* Modern Hex Loader */
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            margin: 0 auto 10px auto;
            border: 3px solid rgba(255, 106, 0, 0.2);
            border-top-color: var(--ff-orange);
            border-bottom-color: var(--ff-yellow);
            border-radius: 50%;
            animation: cyber-spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes cyber-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>

<body>

<main class="cyber-panel">
    <h1 class="title">Security Override</h1>
    <p class="subtitle">Complete action to gain access</p>

    <button class="btn-cyber" id="hypeBtn" onclick="UnlockSystem.initiateSequence()">
        ⚡ Initiate Hype Sequence
    </button>

    <div class="status-container">
        <div id="loader" class="loader"></div>
        <div id="statusText" class="msg-text"></div>
    </div>
</main>

<script>
const UnlockSystem = {
    config: {
        targetUrl: "dashboard.html",
        hypeLink: "https://youtu.be/AVX_d-Bqmrw?si=05IRKzvRuUeeZB6_",
        requiredWaitSec: 15,
        verificationSec: 5
    },

    elements: {
        btn: document.getElementById('hypeBtn'),
        status: document.getElementById('statusText'),
        loader: document.getElementById('loader')
    },

    init() {
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                this.checkStatus();
            }
        });
        this.checkStatus();
    },

    initiateSequence() {
        localStorage.setItem("hypeInitTime", Date.now());
        this.updateStatus("Sequence initiated. Awaiting confirmation...", "verifying");
        window.open(this.config.hypeLink, "_blank");
    },

    checkStatus() {
        const initTime = localStorage.getItem("hypeInitTime");
        if (!initTime) return; // Agar click nahi kiya toh kuch mat karo

        const timeElapsed = (Date.now() - initTime) / 1000;

        if (timeElapsed >= this.config.requiredWaitSec) {
            // 15 sec pure ho gaye, successful redirect
            localStorage.removeItem("hypeInitTime");
            this.startVerification();
        } else {
            // Agar jaldi aa gaya, toh timer delete NAHI karna hai
            // Bas remaining time show kar do
            let secondsLeft = Math.ceil(this.config.requiredWaitSec - timeElapsed);
            this.updateStatus(`❌ Security Alert: Please wait ${secondsLeft} more seconds on the link!`, "error");
        }
    },

    startVerification() {
        this.elements.btn.classList.add('hidden');
        this.elements.loader.style.display = "block";
        
        let timeLeft = this.config.verificationSec;

        const countdown = setInterval(() => {
            this.updateStatus(`Bypassing firewall... [${timeLeft}s]`, "verifying");
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdown);
                this.updateStatus("Access Granted. Redirecting...", "success");
                
                setTimeout(() => {
                    window.location.href = this.config.targetUrl;
                }, 1500); 
            }
        }, 1000);
    },

    updateStatus(message, type) {
        this.elements.status.innerHTML = message;
        this.elements.status.className = `msg-text ${type}`;
    }
};

document.addEventListener("DOMContentLoaded", () => UnlockSystem.init());

</script>

</body>
</html>
